name: Filter VPN Proxies

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  filter:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - run: pip install requests pyyaml
    
    - run: python filter_proxies.py
    
    - name: Commit and push if files exist
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add BLACK_VLESS_RUS_FILTERED.txt MOBILE_BYPASS_FILTERED.txt
        git diff --staged --quiet || git commit -m "Update filtered proxies"
        git push
